<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Vlorion - 專注於人工智慧和軟體開發的創新團隊">
    <title>Vlorion - 人工智慧與軟體開發團隊 | AI Innovation</title>
        <link rel="icon" href="web_logo.PNG" type="image/png">
    <style>
        @font-face {
            font-family: 'Orbitron';
            src: url('Orbitron-VariableFont_wght.ttf') format('truetype');
            font-weight: 100 900;
            font-display: swap;
        }

        :root {
            color-scheme: only dark !important;
        }

        html, body {
            color-scheme: only dark !important;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #00d9ff;
            --primary-dark: #0a6f7f;
            --secondary-color: #0f1419;
            --accent-color: #ff006e;
            --accent-light: #b5178f;
            --light-bg: #111825;
            --text-dark: #ffffff;
            --text-light: #94a3b8;
            --cyber-purple: #7c3aed;
            --cyber-blue: #3b82f6;
        }

        @keyframes glow {
            0%, 100% { text-shadow: 0 0 10px rgba(0, 217, 255, 0.5), 0 0 20px rgba(0, 217, 255, 0.3); }
            50% { text-shadow: 0 0 20px rgba(0, 217, 255, 0.8), 0 0 40px rgba(0, 217, 255, 0.5); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse-border {
            0%, 100% { border-color: rgba(0, 217, 255, 0.5); }
            50% { border-color: rgba(255, 0, 110, 0.5); }
        }

        html {
            scroll-behavior: smooth;
        }

        ::selection {
            background: rgba(0, 217, 255, 0.35);
            color: #ffffff;
        }

        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: #0a0e27;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, var(--primary-color), var(--accent-color));
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, var(--accent-color), var(--primary-color));
        }

        * {
            scrollbar-width: thin;
            scrollbar-color: var(--primary-color) #0a0e27;
        }

        body {
            font-family: 'Orbitron', 'Courier New', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: var(--text-dark);
            background: linear-gradient(135deg, #0a0e27 0%, #16213e 50%, #0f1419 100%);
            min-height: 100vh;
            background-attachment: fixed;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(0, 217, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(255, 0, 110, 0.1) 0%, transparent 50%),
                repeating-linear-gradient(0deg, rgba(0, 217, 255, 0.035) 0px, rgba(0, 217, 255, 0.035) 1px, transparent 1px, transparent 64px),
                repeating-linear-gradient(90deg, rgba(0, 217, 255, 0.035) 0px, rgba(0, 217, 255, 0.035) 1px, transparent 1px, transparent 64px);
            pointer-events: none;
            z-index: -1;
        }

        header {
            background: rgba(15, 20, 25, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 217, 255, 0.2);
            color: white;
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 0 30px rgba(0, 217, 255, 0.1);
        }

        nav {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        .nav-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: bold;
            letter-spacing: 3px;
            text-transform: uppercase;
            animation: glow 2s ease-in-out infinite;
            color: var(--primary-color);
        }

        .language-selector {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .lang-btn {
            background: rgba(0, 217, 255, 0.1);
            color: var(--primary-color);
            border: 1px solid rgba(0, 217, 255, 0.3);
            padding: 0.4rem 0.8rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 600;
            transition: all 0.3s;
        }

        .lang-btn:hover,
        .lang-btn.active {
            background: var(--primary-color);
            color: #0f1419;
            border-color: var(--primary-color);
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 2.5rem;
            justify-content: center;
        }

        .nav-links a {
            color: var(--text-light);
            text-decoration: none;
            transition: all 0.3s;
            font-weight: 600;
            position: relative;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--primary-color), var(--accent-color));
            transition: width 0.3s;
        }

        .nav-links a:hover {
            color: var(--primary-color);
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .nav-links a.active {
            color: var(--primary-color);
        }

        .nav-links a.active::after {
            width: 100%;
        }

        .hero {
            background: linear-gradient(135deg, rgba(10, 15, 39, 0.8) 0%, rgba(22, 33, 62, 0.8) 50%, rgba(15, 20, 25, 0.8) 100%);
            color: white;
            padding: 8rem 2rem;
            text-align: center;
            min-height: 700px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(0, 217, 255, 0.2) 0%, transparent 70%);
            border-radius: 50%;
            animation: float 6s ease-in-out infinite;
            top: 10%;
            left: 5%;
        }

        .hero::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255, 0, 110, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            animation: float 8s ease-in-out infinite reverse;
            bottom: -10%;
            right: 5%;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            animation: slideIn 1s ease-out;
        }

        #neuralCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            opacity: 0.6;
        }

        .reveal {
            opacity: 0;
            transform: translateY(24px);
            transition: opacity 0.7s ease, transform 0.7s ease;
        }

        .reveal.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .reveal-stagger.visible > * {
            transition-delay: calc(var(--stagger-index, 0) * 90ms);
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.001ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.001ms !important;
            }
            .reveal {
                opacity: 1;
                transform: none;
            }
        }

        .hero h1 {
            font-size: 4rem;
            margin-bottom: 1rem;
            font-weight: 900;
            letter-spacing: -2px;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--accent-color) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: glow 3s ease-in-out infinite;
            filter: drop-shadow(0 0 10px rgba(0, 217, 255, 0.3));
            position: relative;
            cursor: default;
        }

        .hero h1::before,
        .hero h1::after {
            content: 'VLORION';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--accent-color) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            opacity: 0;
        }

        .hero h1:hover::before {
            opacity: 0.7;
            animation: glitch-1 0.4s steps(2, end) infinite;
        }

        .hero h1:hover::after {
            opacity: 0.7;
            animation: glitch-2 0.4s steps(2, end) infinite;
        }

        @keyframes glitch-1 {
            0% { transform: translate(0, 0); clip-path: inset(0 0 60% 0); }
            50% { transform: translate(-3px, -1px); clip-path: inset(20% 0 40% 0); }
            100% { transform: translate(3px, 1px); clip-path: inset(60% 0 0 0); }
        }

        @keyframes glitch-2 {
            0% { transform: translate(0, 0); clip-path: inset(60% 0 0 0); }
            50% { transform: translate(3px, 1px); clip-path: inset(40% 0 20% 0); }
            100% { transform: translate(-3px, -1px); clip-path: inset(0 0 60% 0); }
        }

        .hero p {
            font-size: 1.3rem;
            margin-bottom: 1rem;
            color: var(--text-light);
            font-weight: 300;
            letter-spacing: 1px;
        }

        .hero .subtitle {
            font-size: 1rem;
            color: var(--primary-color);
            margin-bottom: 2.5rem;
            opacity: 0.9;
            font-family: 'Orbitron', 'Courier New', monospace;
        }

        .cta-button {
            display: inline-block;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--accent-color) 100%);
            color: #0f1419;
            padding: 1.2rem 3rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 700;
            transition: all 0.3s;
            border: 2px solid var(--primary-color);
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9rem;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 217, 255, 0.3);
        }

        .cta-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.2);
            transition: left 0.3s;
        }

        .cta-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 217, 255, 0.5), 0 0 20px rgba(255, 0, 110, 0.2);
        }

        .cta-button:hover::before {
            left: 100%;
        }

        .scroll-hint {
            display: inline-block;
            background: none;
            border: none;
            color: var(--text-light);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
            opacity: 0.75;
            transition: all 0.3s;
            cursor: default;
        }

        .scroll-hint:hover {
            color: var(--primary-color);
            opacity: 1;
        }

        section {
            padding: 6rem 2rem;
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        h2 {
            font-size: 3rem;
            margin-bottom: 1rem;
            text-align: center;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--accent-color) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 900;
            letter-spacing: -1px;
            text-transform: uppercase;
            position: relative;
            padding-bottom: 1.25rem;
        }

        h2::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 64px;
            height: 3px;
            border-radius: 3px;
            background: linear-gradient(90deg, var(--primary-color), var(--accent-color));
            box-shadow: 0 0 12px rgba(0, 217, 255, 0.6);
        }

        .eyebrow {
            display: block;
            text-align: center;
            font-family: 'Orbitron', 'Courier New', monospace;
            font-size: 0.78rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--primary-color);
            opacity: 0.65;
            margin-bottom: 0.9rem;
        }

        h3 {
            font-size: 1.4rem;
            margin-bottom: 1rem;
            color: var(--primary-color);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #about {
            background: linear-gradient(135deg, rgba(15, 20, 25, 0.6) 0%, rgba(22, 33, 62, 0.4) 100%);
            border-top: 1px solid rgba(0, 217, 255, 0.2);
            border-bottom: 1px solid rgba(0, 217, 255, 0.2);
            backdrop-filter: blur(10px);
        }

        .about-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            align-items: center;
            margin-top: 3rem;
        }

        .about-text p {
            margin-bottom: 1.5rem;
            color: var(--text-light);
            font-size: 1.05rem;
            line-height: 1.8;
        }

        .about-highlight {
            background: linear-gradient(135deg, rgba(0, 217, 255, 0.05) 0%, rgba(255, 0, 110, 0.05) 100%);
            padding: 2.5rem;
            border-radius: 12px;
            border: 1px solid rgba(0, 217, 255, 0.2);
            backdrop-filter: blur(10px);
            box-shadow: 0 0 30px rgba(0, 217, 255, 0.1);
        }

        .about-highlight h3 {
            margin-bottom: 1.5rem;
        }

        .about-highlight ul {
            list-style: none;
            color: var(--text-light);
        }

        .about-highlight li {
            margin-bottom: 1.2rem;
            padding-left: 1.5rem;
            position: relative;
            font-size: 1.05rem;
        }

        .about-highlight li::before {
            content: '';
            position: absolute;
            left: 0;
            top: 6px;
            width: 8px;
            height: 8px;
            background: var(--primary-color);
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(0, 217, 255, 0.6);
        }

        #services {
            background: transparent;
        }

        .section-subtitle {
            color: var(--text-light);
            font-size: 1.1rem;
            margin-bottom: 3rem;
            text-align: center;
            font-style: italic;
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        .service-card {
            background: linear-gradient(135deg, rgba(0, 217, 255, 0.05) 0%, rgba(255, 0, 110, 0.05) 100%);
            padding: 2rem;
            border-radius: 12px;
            transition: all 0.3s;
            border: 1px solid rgba(0, 217, 255, 0.2);
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }

        .service-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 217, 255, 0.1), transparent);
            transition: left 0.3s;
        }

        .service-card:hover {
            transform: translateY(-8px);
            border-color: var(--primary-color);
            box-shadow: 0 0 30px rgba(0, 217, 255, 0.3);
        }

        .service-card:hover::before {
            left: 100%;
        }

        .service-icon {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            animation: float 4s ease-in-out infinite;
        }

        .service-card h3 {
            margin-bottom: 1rem;
            color: var(--primary-color);
        }

        .service-card p {
            color: var(--text-light);
            line-height: 1.8;
            font-size: 0.95rem;
            position: relative;
            z-index: 1;
        }

        #portfolio {
            background: transparent;
        }

        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        .portfolio-item {
            background: linear-gradient(135deg, rgba(0, 217, 255, 0.05) 0%, rgba(255, 0, 110, 0.05) 100%);
            border-radius: 12px;
            border: 1px solid rgba(0, 217, 255, 0.2);
            backdrop-filter: blur(10px);
            transition: all 0.3s;
            overflow: hidden;
            position: relative;
        }

        .portfolio-item:hover {
            transform: translateY(-8px);
            border-color: var(--primary-color);
            box-shadow: 0 0 30px rgba(0, 217, 255, 0.3);
        }

        .portfolio-thumb {
            width: 100%;
            height: 160px;
            background: linear-gradient(135deg, rgba(0, 217, 255, 0.15) 0%, rgba(255, 0, 110, 0.15) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary-color);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(0, 217, 255, 0.2);
        }

        .portfolio-item-body {
            padding: 1.5rem 2rem 2rem;
        }

        .portfolio-item h3 {
            margin-bottom: 0.75rem;
        }

        .portfolio-item p {
            color: var(--text-light);
            line-height: 1.8;
            font-size: 0.95rem;
        }

        #team {
            background: linear-gradient(135deg, rgba(15, 20, 25, 0.6) 0%, rgba(22, 33, 62, 0.4) 100%);
            border-top: 1px solid rgba(0, 217, 255, 0.2);
            border-bottom: 1px solid rgba(0, 217, 255, 0.2);
            backdrop-filter: blur(10px);
        }

        .team-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
            justify-content: center;
        }

        .team-member {
            background: linear-gradient(135deg, rgba(0, 217, 255, 0.05) 0%, rgba(255, 0, 110, 0.05) 100%);
            padding: 3rem 2rem;
            border-radius: 12px;
            text-align: center;
            border: 1px solid rgba(0, 217, 255, 0.2);
            backdrop-filter: blur(10px);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
            max-width: 450px;
            margin: 0 auto;
        }

        .team-member::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(0, 217, 255, 0.1) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .team-member:hover {
            transform: translateY(-8px);
            border-color: var(--primary-color);
            box-shadow: 0 0 30px rgba(0, 217, 255, 0.3);
        }

        .team-member:hover::before {
            opacity: 1;
        }

        .member-avatar {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            border-radius: 50%;
            margin: 0 auto 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: white;
            box-shadow: 0 0 20px rgba(0, 217, 255, 0.5);
            border: 2px solid var(--primary-color);
            position: relative;
            z-index: 1;
        }

        .team-member h3 {
            color: var(--text-dark);
            margin-bottom: 0.5rem;
            position: relative;
            z-index: 1;
            font-size: 1.8rem;
        }

        .team-member .role {
            color: var(--primary-color);
            font-weight: 600;
            margin-bottom: 1rem;
            text-transform: uppercase;
            font-size: 0.95rem;
            letter-spacing: 1px;
            position: relative;
            z-index: 1;
        }

        .team-member p {
            color: var(--text-light);
            font-size: 1.05rem;
            line-height: 1.8;
            position: relative;
            z-index: 1;
        }

        #contact {
            background: linear-gradient(135deg, rgba(15, 20, 25, 0.8) 0%, rgba(22, 33, 62, 0.6) 100%);
            border-top: 1px solid rgba(0, 217, 255, 0.2);
            text-align: center;
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }

        #contact::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(0, 217, 255, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            top: -10%;
            left: 5%;
        }

        #contact::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255, 0, 110, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            bottom: -20%;
            right: 10%;
        }

        #contact h2 {
            color: var(--text-dark);
            position: relative;
            z-index: 1;
        }

        .contact-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 2rem;
            margin-top: 3rem;
            position: relative;
            z-index: 1;
        }

        .contact-item {
            padding: 2rem;
            background: linear-gradient(135deg, rgba(0, 217, 255, 0.05) 0%, rgba(255, 0, 110, 0.05) 100%);
            border-radius: 10px;
            border: 1px solid rgba(0, 217, 255, 0.2);
            backdrop-filter: blur(10px);
            transition: all 0.3s;
        }

        .contact-item:hover {
            border-color: var(--primary-color);
            box-shadow: 0 0 20px rgba(0, 217, 255, 0.3);
            transform: translateY(-5px);
        }

        .contact-item,
        .portfolio-item {
            position: relative;
        }

        .contact-item::before,
        .contact-item::after,
        .portfolio-item::before,
        .portfolio-item::after {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .contact-item::before,
        .portfolio-item::before {
            top: 8px;
            left: 8px;
            border-top: 2px solid var(--primary-color);
            border-left: 2px solid var(--primary-color);
        }

        .contact-item::after,
        .portfolio-item::after {
            bottom: 8px;
            right: 8px;
            border-bottom: 2px solid var(--accent-color);

        let currentLang = 'zh-TW';

        function setLanguage(lang) {
            currentLang = lang;
            const t = translations[lang];
            
            document.querySelectorAll('[data-i18n]').forEach(element => {
                const key = element.getAttribute('data-i18n');
                if (t[key]) {
                    if (element.tagName === 'INPUT' || element.tagName === 'TEXTAREA') {
                        element.value = t[key];
                    } else {
                        element.textContent = t[key];
                    }
                }
            });

            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelector(`[data-lang="${lang}"]`).classList.add('active');

            document.documentElement.lang = lang;
        }

        document.addEventListener('DOMContentLoaded', function() {
            setLanguage('zh-TW');
        });

                <h3 style="color: white; font-size: 1rem; margin-bottom: 0.5rem;" data-i18n="contact_address">台灣 台中市</h3>
                <p data-i18n="contact_address_value"></p>
            </div>
        </div>
        <div class="contact-links">
            <a href="https://www.instagram.com/vlorionofficial" target="_blank">Instagram</a>
            <a href="https://x.com/vlorionoffical" target="_blank">X (Twitter)</a>
        </div>
    </section>

    <footer>
        <p data-i18n="footer"></p>
        <p class="footer-ps" data-i18n="footer_ps"></p>
    </footer>

    <button class="back-to-top" id="backToTop" aria-label="Back to top" onclick="window.scrollTo({top:0, behavior:'smooth'});">↑</button>

    <script>
        // Scroll-reveal
        const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        if (!prefersReducedMotion && 'IntersectionObserver' in window) {
            const revealObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                        revealObserver.unobserve(entry.target);
                    }
                });
            }, { threshold: 0.15, rootMargin: '0px 0px -40px 0px' });
            document.querySelectorAll('.reveal').forEach(el => revealObserver.observe(el));
        } else {
            document.querySelectorAll('.reveal').forEach(el => el.classList.add('visible'));
        }

        // Back-to-top button visibility
        const backToTop = document.getElementById('backToTop');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 500) {
                backToTop.classList.add('visible');
            } else {
                backToTop.classList.remove('visible');
            }
        }, { passive: true });

        // Active nav link tracking
        const navLinks = document.querySelectorAll('.nav-links a');
        const navSections = Array.from(navLinks)
            .map(link => document.querySelector(link.getAttribute('href')))
            .filter(Boolean);

        if ('IntersectionObserver' in window) {
            const navObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const id = '#' + entry.target.id;
                        navLinks.forEach(link => {
                            link.classList.toggle('active', link.getAttribute('href') === id);
                        });
                    }
                });
            }, { threshold: 0.4, rootMargin: '-80px 0px -50% 0px' });
            navSections.forEach(section => navObserver.observe(section));
        }

        // Neural network hero background
        (function () {
            const canvas = document.getElementById('neuralCanvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            let width, height, nodes;
            const NODE_COUNT = 48;
            const LINK_DIST = 140;

            function resize() {
                const hero = canvas.parentElement;
                width = canvas.width = hero.offsetWidth;
                height = canvas.height = hero.offsetHeight;
            }

            function makeNodes() {
                nodes = Array.from({ length: NODE_COUNT }, () => ({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    vx: (Math.random() - 0.5) * 0.35,
                    vy: (Math.random() - 0.5) * 0.35
                }));
            }

            function step() {
                ctx.clearRect(0, 0, width, height);

                nodes.forEach(n => {
                    n.x += n.vx;
                    n.y += n.vy;
                    if (n.x < 0 || n.x > width) n.vx *= -1;
                    if (n.y < 0 || n.y > height) n.vy *= -1;
                });

                for (let i = 0; i < nodes.length; i++) {
                    for (let j = i + 1; j < nodes.length; j++) {
                        const a = nodes[i], b = nodes[j];
                        const dx = a.x - b.x, dy = a.y - b.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < LINK_DIST) {
                            const alpha = (1 - dist / LINK_DIST) * 0.35;
                            ctx.strokeStyle = `rgba(0, 217, 255, ${alpha})`;
                            ctx.lineWidth = 1;
                            ctx.beginPath();
                            ctx.moveTo(a.x, a.y);
                            ctx.lineTo(b.x, b.y);
                            ctx.stroke();
                        }
                    }
                }

                nodes.forEach(n => {
                    ctx.beginPath();
                    ctx.arc(n.x, n.y, 2, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(0, 217, 255, 0.8)';
                    ctx.fill();
                });

                if (!prefersReducedMotion) requestAnimationFrame(step);
            }

            resize();
            makeNodes();
            window.addEventListener('resize', () => {
                resize();
                makeNodes();
            });

            if (prefersReducedMotion) {
                step(); // draw a single static frame
            } else {
                step();
            }
        })();
    </script>
</body>
</html>
